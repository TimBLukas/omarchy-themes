# Misty Rainforest Theme - Hyprland Configuration
# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.

general {
    col.active_border = rgb(7a9e7e)
    col.inactive_border = rgb(2a3a30)
    border_size = 2
    gaps_in = 5
    gaps_out = 6
}

animations {
    enabled = yes    
    
    bezier = ease,     0.40, 0.00, 0.20, 1.00
    bezier = easeOut,  0.15, 0.10, 0.20, 1.00
    bezier = easeIn,   0.50, 0.00, 0.70, 0.20
    bezier = float,    0.20, 0.08, 0.12, 1.00   

    animation = windows,            1, 3.0, float
    animation = windowsIn,          1, 2.5, easeOut
    animation = windowsOut,         1, 2.2, easeIn
    animation = windowsMove,        1, 3.5, float

    animation = fade,               1, 2.5, ease
    animation = fadeIn,             1, 2.2, easeOut
    animation = fadeOut,            1, 2.0, easeIn
    animation = fadeDim,            1, 2.2, ease

    animation = layers,             1, 2.5, ease
    animation = layersIn,           1, 2.3, easeOut
    animation = layersOut,          1, 2.0, easeIn

    animation = workspaces,         1, 3.0, float
    animation = specialWorkspace,   1, 2.8, float

    animation = border,             1, 2.5, ease
    animation = borderangle,        1, 3.5, easeOut

    animation = fadeSwitch,         1, 1.8, easeOut
}

decoration {
    rounding = 10
    shadow {
        enabled = true
        range = 20
        render_power = 3
        offset = 0 2
        color = rgba(208, 135, 112, 0.20)
        color_inactive = rgba(46, 52, 64, 0.3)
    } 
    
blur {
    enabled = true
    size = 7
    passes = 4
    contrast = 1.1
    brightness = 1.15
    vibrancy = 0.25
    vibrancy_darkness = 0.15
    noise = 0.02
    ignore_opacity = true
    new_optimizations = on
}

active_opacity = 0.88
inactive_opacity = 0.82
fullscreen_opacity = 1.0
}

layerrule = blur on, match:namespace walker
layerrule = ignore_alpha 1, match:namespace walker
layerrule = blur on, match:namespace waybar
layerrule = blur on, match:namespace mako
layerrule = blur on, match:namespace swayosd
layerrule = ignore_alpha 0.2, match:namespace mako
layerrule = ignore_alpha 0.1, match:namespace waybar